seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 128
  num_layers: 2

training:
  batch_size: 128
  updates: 200
  smoke_updates: 40
  train_sequence_length: 64
  learning_rate: 1.0e-3
  grad_clip_norm: 10.0
  eval_every: 200
  smoke_eval_every: 40
  val_horizon: 200
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0
  rollout_weight: 0.0
  rollout_train_horizon: 5

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 990
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 990]
  vpt_thresholds: [0.10, 0.25, 0.50]
