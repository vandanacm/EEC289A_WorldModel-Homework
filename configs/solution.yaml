seed: 13
force_cpu: false

model:
  hidden_dim: 192
  task_embedding_dim: 32

loss:
  warmup: 10
  one_step_weight: 1.0
  rollout_weight: 0.3
  rollout_train_horizon: 15
  physics_weight: 0.01

training:
  learning_rate: 0.0008
  updates: 600
  updates_smoke: 20
  batch_size: 64
  batch_size_smoke: 8
  eval_batch_size: 64
  eval_every: 20
  grad_clip: 100.0
