seed: 11
force_cpu: false

model:
  hidden_dim: 128

loss:
  warmup: 10
  one_step_weight: 1.0
  rollout_weight: 0.0
  rollout_train_horizon: 5
  physics_weight: 0.0

training:
  learning_rate: 0.001
  updates: 400
  updates_smoke: 20
  batch_size: 64
  batch_size_smoke: 8
  eval_batch_size: 64
  eval_every: 20
  grad_clip: 100.0
